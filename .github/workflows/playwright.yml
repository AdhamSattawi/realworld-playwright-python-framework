name: Playwright E2E Tests
on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Automation Repo
        uses: actions/checkout@v6
        with:
          path: automation

      - name: Checkout App Repo
        uses: actions/checkout@v6
        with:
          repository: AdhamSattawi/next-fullstack-realworld-app
          path: app

      - name: Start App Environment
        env:
          NEXTAUTH_URL: http://realworld-prod:3000
          NEXT_PUBLIC_APP_URL: http://realworld-prod:3000
        run: |
          cd app
          docker compose -f docker-compose.production.yml build
          docker compose -f docker-compose.production.yml up -d
          docker compose -f docker-compose.production.yml exec -T realworld env | grep -E "NEXTAUTH_URL|NEXT_PUBLIC_APP_URL" || true

      - name: Run Automation Tests
        run: |
          cd automation
          docker build -t automation-tests .
          
          docker run --rm --network next-realworld-prod_default --ipc=host --shm-size=1g \
            -v "$GITHUB_WORKSPACE/automation:/automation" \
            -w /automation \
            -e BASE_URL=http://realworld-prod:3000 \
            automation-tests \
            python scripts/wait_for_url.py --url http://realworld-prod:3000/login --timeout 120

          docker run --rm --network next-realworld-prod_default --ipc=host --shm-size=1g \
            -v "$GITHUB_WORKSPACE/automation:/automation" \
            -w /automation \
            -e BASE_URL=http://realworld-prod:3000 \
            automation-tests \
            pytest --base-url http://realworld-prod:3000

      - name: Upload Test Results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-report
          path: |
            automation/reports/
            automation/test-results/

      - name: Dump App Logs On Failure
        if: failure()
        run: |
          cd app
          docker compose -f docker-compose.production.yml ps
          docker compose -f docker-compose.production.yml logs --no-color --tail=300